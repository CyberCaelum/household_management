server:
  port: 90

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: false
    allow-bean-definition-overriding: true
  datasource:
      driver-class-name: ${household.datasource.driver-class-name}
      url: jdbc:mariadb://${household.datasource.host}:${household.datasource.port}/${household.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${household.datasource.username}
      password: ${household.datasource.password}
  data:
    redis:
      database: ${spring.data.redis.database}
      password: ${spring.data.redis.password}
      port: ${spring.data.redis.port}
      host: ${spring.data.redis.host}
      timeout: ${spring.data.redis.timeout}
      lettuce:
        pool:
          max-active: ${spring.data.redis.lettuce.pool.max-active}
          max-idle: ${spring.data.redis.lettuce.pool.max-idle}
          min-idle: ${spring.data.redis.lettuce.pool.min-idle}
  ai:
    ollama:
      base-url: http://localhost:11434
      embedding:
        options:
          model: embeddinggemma:300m
    model:
      embedding: ollama
    retry:
      max-attempts: ${spring.ai.retry.max-attempts}
    deepseek:
      api-key: ${spring.ai.deepseek.api-key}
      chat:
        options:
          model: ${spring.ai.deepseek.chat.options.model}
          temperature: ${spring.ai.deepseek.chat.options.temperature}
          max-tokens: ${spring.ai.deepseek.chat.options.max-tokens}
          stop: ${spring.ai.deepseek.chat.options.stop}
    vectorstore:
      milvus:
        database-name: customer_service_knowledge
        collection-name: question_answer
        initialize-schema: true
        embedding-dimension: 768
        metric-type: COSINE
        index-type: IVF_FLAT
        id-field-name: id
        content-field-name: question
        metadata-field-name: metadata
        embedding-field-name: question_vector
        auto-id: false
        client:
          host: localhost
          port: 19530
          username: root

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: org.cybercaelum.household-management.pojo.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

wechat:
  pay:
    app-id: ${wechat.pay.app-id}          # 微信小程序/公众号APPID
    mch-id: ${wechat.pay.mch-id}                  # 微信支付商户号
    api-v3-key: ${wechat.pay.api-v3-key}    # 商户API V3密钥
    mch-serial-no: ${wechat.pay.mch-serial-no}  # 商户证书序列号
    private-key-path: ${wechat.pay.private-key-path} # 商户私钥文件路径
    notify-url: ${wechat.pay.notify-url}  # 支付回调地址
    refund-notify-url: ${wechat.pay.refund-notify-url}  # 退款回调地址
    sandbox: ${wechat.pay.sandbox}  # 是否使用沙箱环境

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    disable-swagger-default-url: true
    # 添加认证持久化配置
    persist-authorization: true
    # 添加标签排序
    tags-sorter: alpha
    # 添加操作排序
    operations-sorter: method
  # info 配置移到 info 节点下
  info:
    title: "家政"
    version: "1.0"
    description: "家政接口文档"

household:
  jwt:
    # 密钥
    user-secret-key: ${household.jwt.user-secret-key}
    # 过期时间
    user-ttl: ${household.jwt.user-ttl}
    #令牌名字
    user-token-name: ${household.jwt.user-token-name}
  alioss:
    endpoint: ${household.alioss.endpoint}
    access-key-id: ${household.alioss.access-key-id}
    access-key-secret: ${household.alioss.access-key-secret}
    bucket-name: ${household.alioss.bucket-name}
  openim:
    # OpenIM API 地址
    api-address: ${household.openim.api-address}
    # OpenIM 管理员密钥
    secret: ${household.openim.secret}
    # OpenIM 管理员账号
    admin-user-id: ${household.openim.admin-user-id:imAdmin}
    # 默认平台ID (1-9)
    default-platform-id: ${household.openim.default-platform-id:5}

rocketmq:
  producer:
    endpoints: 127.0.0.1:8081
    ssl-enabled: false






